name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "RBX Alt Manager.sln"

      - name: Build (Release, x86)
        run: msbuild "RBX Alt Manager.sln" /p:Configuration=Release /p:Platform=x86 /m

      - name: Locate build output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Include "Roblox Account Manager.exe" |
            Select-Object -ExpandProperty FullName
          Get-ChildItem build -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RBX-Alt-Manager-Release-x86
          path: build/Release/
          if-no-files-found: error
